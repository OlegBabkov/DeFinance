services:
  postgres:
    image: postgres:17-alpine
    container_name: definance-postgres
    environment:
      POSTGRES_DB: definance
      POSTGRES_USER: definance
      POSTGRES_PASSWORD: definance_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U definance"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: definance-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.4
    container_name: definance-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy

  kibana-setup:
    image: curlimages/curl:latest
    container_name: definance-kibana-setup
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Waiting for Kibana to become available...";
        until curl -sf http://kibana:5601/api/status | grep -q '"available"'; do
          sleep 10;
        done;
        echo "Initializing Fleet...";
        curl -sf -X POST "http://kibana:5601/api/fleet/setup" \
          -H "kbn-xsrf: true" -H "Content-Type: application/json";
        echo "Installing APM integration...";
        curl -sf -X POST "http://kibana:5601/api/fleet/epm/packages/apm" \
          -H "kbn-xsrf: true" -H "Content-Type: application/json" \
          -d '{"force":true}';
        echo "APM integration installed.";
    depends_on:
      - kibana

  apm-server:
    image: docker.elastic.co/apm/apm-server:8.13.4
    container_name: definance-apm-server
    ports:
      - "8200:8200"
    command: >-
      apm-server -e
        -E output.elasticsearch.hosts=["elasticsearch:9200"]
        -E apm-server.kibana.enabled=true
        -E apm-server.kibana.host="http://kibana:5601"
        -E apm-server.auth.anonymous.enabled=true
        -E apm-server.auth.anonymous.allow_service=["*"]
        -E apm-server.data_streams.wait_for_integration=false
    depends_on:
      kibana-setup:
        condition: service_completed_successfully
      elasticsearch:
        condition: service_healthy

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.100.0
    container_name: definance-otel-collector
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml
    ports:
      - "4317:4317"
      - "4318:4318"
    depends_on:
      - apm-server

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: definance-api
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=postgres;Database=definance;Username=definance;Password=definance_pass"
      Observability__ElasticsearchUrl: "http://elasticsearch:9200"
      Observability__OtlpEndpoint: "http://otel-collector:4317"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      otel-collector:
        condition: service_started

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    container_name: definance-web
    ports:
      - "3000:80"
    depends_on:
      - api

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: definance-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@definance.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  elasticsearch_data:
