services:
  postgres:
    image: postgres:17-alpine
    container_name: definance-postgres
    environment:
      POSTGRES_DB: definance
      POSTGRES_USER: definance
      POSTGRES_PASSWORD: definance_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U definance"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: definance-api
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=postgres;Database=definance;Username=definance;Password=definance_pass"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    container_name: definance-web
    ports:
      - "3000:80"
    depends_on:
      - api

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: definance-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@definance.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
