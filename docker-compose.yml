services:
  postgres:
    image: postgres:17-alpine
    container_name: definance-postgres
    environment:
      POSTGRES_DB: definance
      POSTGRES_USER: definance
      POSTGRES_PASSWORD: definance_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U definance"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: definance-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@definance.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
